interface:
  display_name: "upstream-report"
  short_description: "Route Asterline or Auggie bugs with source evidence"
  search_terms:
    - "upstream-report"
    - "asterline bug"
    - "asterline issue"
    - "asterline-runtime bug"
    - "openai auggie bug"
    - "auggie upstream issue"
  default_prompt: "Use $upstream-report to investigate this Asterline or Auggie bug, compare Asterline evidence with /tmp <owner>/<auggie-cli-source-repo> source, choose the correct GitHub repo, and file an issue (or, for <owner>/<auggie-cli-source-repo> only, a PR — never a PR on Asterline upstream source repository) with reproduction, root cause, fix guidance, and the asterline-generated label and footer."
