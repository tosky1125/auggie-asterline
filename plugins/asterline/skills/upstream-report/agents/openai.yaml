interface:
  display_name: "upstream-report"
  short_description: "Route Asterline or Auggie bugs with source evidence"
  search_terms:
    - "upstream-report"
    - "asterline bug"
    - "asterline issue"
    - "asterline-runtime bug"
    - "openai auggie bug"
    - "auggie upstream issue"
  default_prompt: "Use $upstream-report to investigate this Asterline or Auggie bug and file an evidence-backed issue on tosky1125/auggie-asterline. For Auggie core, require the user to supply the authoritative repository before routing or PR work."
