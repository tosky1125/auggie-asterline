interface:
  display_name: "upstream-fix"
  short_description: "Contribute verified Asterline or Auggie bug fixes"
  search_terms:
    - "upstream-fix"
    - "contribute a bug fix"
    - "contribute to fix bug"
    - "fix bug pr"
    - "asterline fix"
    - "asterline-runtime bug fix"
    - "auggie bug fix pr"
  default_prompt: "Use $upstream-fix to debug this Asterline or Auggie bug, work from a fresh /tmp clone and worktree, implement the smallest verified fix, and deliver it as a verified-fix issue on tosky1125/auggie-asterline. For Auggie core, require the user to supply the authoritative repository before any PR work."
