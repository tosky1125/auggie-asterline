name: Feature request
description: Propose a focused asterline-code-intel improvement.
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should asterline-code-intel do?
    validations:
      required: true
